interface:
  display_name: "Handoff"
  short_description: "Use when a long run must survive a context limit, session end, or operator change — capture the run's true state as a verifiable HANDOFF.md, or resume from one, re-verifying every claim first."
  default_prompt: "Use code-ops-suite:handoff for this task."
policy:
  allow_implicit_invocation: false
