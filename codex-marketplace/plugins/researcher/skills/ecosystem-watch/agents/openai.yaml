interface:
  display_name: "Ecosystem Watch"
  short_description: "Use when you want to know what changed in OUR stack that we should act on — dependency updates, CVEs, deprecations, newly-available capabilities — grounded in what we actually use. Schedulable; discovery only — writes no code."
