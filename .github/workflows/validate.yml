name: validate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# A newer push to the same ref supersedes the running validation — cancel it instead of paying
# for a structural lint + eval pass for a commit that can no longer merge/land.
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  structural-lint:
    runs-on: ubuntu-latest
    steps:
      # Pinned to commit SHAs (per the suite's own supply-chain-trust skill) so a moved tag
      # cannot inject code into CI. Bump deliberately; the trailing comment tracks the version.
      # fetch-depth: 0 (full history) so the PR-only plugin-bump check below can diff against
      # origin/<base_ref> — a shallow clone would not have the base branch's history available.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Structural lint (the gate)
        run: node scripts/lint-plugins.mjs

      - name: Codex marketplace render + drift check
        run: node scripts/build-codex-marketplace.mjs --check

      - name: Zero-dependency guard
        run: node scripts/check-no-deps.mjs

      - name: Register-staleness regression eval
        run: node evals/register-staleness/run.mjs

      - name: AI-trace scanner eval
        run: node evals/ai-tells/run.mjs

      - name: lib-docs engine eval
        run: node evals/lib-docs/run.mjs

      - name: MCP server smoke test
        run: node evals/lib-docs/mcp-smoke.mjs

      - name: Codex marketplace regression eval
        run: node evals/codex-marketplace/run.mjs

      - name: Researcher egress-manifest eval
        run: node evals/research-manifest/run.mjs

      - name: Script-guard regression eval (2026-06-23 audit fixes)
        run: node evals/script-guards/run.mjs

      - name: Proof-receipt + proof-integrity eval
        run: node evals/proof-receipts/run.mjs

      - name: Autofix scope-gate eval
        run: node evals/autofix-scope/run.mjs

      - name: Redaction + injection-tell scanner eval
        run: node evals/redaction-scan/run.mjs

      - name: Fixture-drift guard (answer keys still match their fixtures)
        run: |
          for k in evals/*/ANSWER_KEY.json; do
            echo "== $k =="
            node evals/score.mjs "$k" --check
          done

      - name: Preflight regression eval
        run: node evals/preflight/run.mjs

      - name: Repo-map regression eval
        run: node evals/repo-map/run.mjs

      - name: Doc line-citation gate
        run: node scripts/check-doc-citations.mjs

      - name: Lint-gate fixture eval
        run: node evals/lint-plugins/run.mjs

      - name: Release-tooling eval
        run: node evals/release-tooling/run.mjs

      - name: Doc-citation checker eval
        run: node evals/doc-citations/run.mjs

      - name: claude plugin validate (best-effort)
        run: |
          if command -v claude >/dev/null 2>&1; then
            claude plugin validate . || true
            for p in plugins/*/; do
              echo "validating $p"
              claude plugin validate "$p" || true
            done
          else
            echo "claude CLI not on runner; structural-lint is the gate."
          fi

      - name: Plugin version-bump gate (PR only)
        if: github.event_name == 'pull_request'
        run: node scripts/check-plugin-bump.mjs --base "origin/${{ github.base_ref }}"

  structural-lint-windows:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      # Same pinned actions as structural-lint above — see that job's comment for the SHA-pin
      # rationale. This job mirrors the ubuntu structural-lint checks on Windows so a
      # platform-specific regression (path handling, shell quoting, line endings) is caught
      # before merge instead of surfacing only for a Windows contributor.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Structural lint (the gate)
        run: node scripts/lint-plugins.mjs

      - name: Zero-dependency guard
        run: node scripts/check-no-deps.mjs

      - name: Codex marketplace render + drift check
        run: node scripts/build-codex-marketplace.mjs --check

      - name: Preflight regression eval
        run: node evals/preflight/run.mjs

      - name: Repo-map regression eval
        run: node evals/repo-map/run.mjs

      - name: Lint-gate fixture eval
        run: node evals/lint-plugins/run.mjs

      - name: Release-tooling eval
        run: node evals/release-tooling/run.mjs

      - name: Doc-citation checker eval
        run: node evals/doc-citations/run.mjs

      - name: Script-guard regression eval (2026-06-23 audit fixes)
        run: node evals/script-guards/run.mjs

      - name: Register-staleness regression eval
        run: node evals/register-staleness/run.mjs
