name: Deep Review (rigor)

# Verification-first PR gate. Runs the rigor suite's deep-review bar on every PR.
# Needs a Claude credential: a Pro/Max subscription token (CLAUDE_CODE_OAUTH_TOKEN, from
# `claude setup-token`) OR an Anthropic API key (ANTHROPIC_API_KEY). Skips cleanly without
# either (e.g. fork PRs) so it never blocks on a missing secret. Actions pinned to commit SHAs
# per the suite's own supply-chain-trust skill — bump deliberately (trailing comment tracks the tag).

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write # claude-code-action mints an OIDC token for the Pro/Max OAuth path

# A newer push to the same PR supersedes the running review — cancel it instead of paying
# a full model review for a commit that can no longer merge. The new head runs in full.
concurrency:
  group: deep-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deep-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Detect credential
        id: key
        run: echo "present=${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' || secrets.ANTHROPIC_API_KEY != '' }}" >> "$GITHUB_OUTPUT"

      - if: steps.key.outputs.present == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Scope check (generated data only?)
        id: scope
        if: steps.key.outputs.present == 'true'
        env:
          BASE: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE" --quiet
          files=$(git diff --name-only "origin/$BASE"...HEAD)
          echo "changed files:"; echo "$files"
          # Machine-generated data artifacts (deterministically drift-checked in validate.yml).
          if [ -n "$files" ] && [ -z "$(echo "$files" | grep -v -E '^evals/FLOOR_TABLE\.md$')" ]; then
            echo "substantive=false" >> "$GITHUB_OUTPUT"
            echo "generated-data-only diff — deep review skipped (validate.yml drift-checks these; opsec-gate still reviews)"
          else
            echo "substantive=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.key.outputs.present == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      # Bounded retry: a transient failure (credential-exchange hiccup, action-side flake) gets one
      # extra attempt before the gate gives up. continue-on-error lets the job read `outcome` (the
      # real per-attempt result) without failing here — the guard step below is what actually fails
      # the job if BOTH attempts fail, so this stays fail-closed rather than becoming fail-open.
      - name: Verification-first review
        id: review
        if: steps.key.outputs.present == 'true' && steps.scope.outputs.substantive == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@30544b674398ee15c84819bd87caf8a87e8c7b55 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run /rigor:deep-review for this pull request if the rigor plugin is available.
            If it is not, apply the verification-first bar inline:

            Ground truth first — run `node scripts/lint-plugins.mjs`, `node scripts/check-no-deps.mjs`,
            and the harnesses under `evals/` so the review starts from facts, then review the diff
            against the surrounding code.

            Assign each concern an evidence tier: CONFIRMED (reproduced — a failing test or trace on
            this code) / PROBABLE (strong static evidence, not executed) / SPECULATIVE (a low-confidence
            lead). Before reporting anything, run a disconfirmation pass: is it reachable, already handled,
            intentional, or already tested? Drop what does not survive.

            Post inline comments at file:line, each with its tier and a concrete fix, grouped Blocking
            (CONFIRMED defect or regression) / Should-fix / Nit. Flag any new inconsistency or a regressed
            lint/eval enforcement. For this repo specifically, treat as Blocking: a bundled plugin copy
            that drifts from its canonical scripts/ source, and any change that makes lint-plugins or an
            eval pass while the behavior it guards is broken.

            End with a verdict (approve / approve-with-nits / request-changes) and a short risk read.
            Do NOT inflate tiers: never block on a SPECULATIVE, never wave through a CONFIRMED defect.
          # Model tier pinned — gate quality must not silently track the action default; bump deliberately.
          claude_args: "--allowed-tools Read,Grep,Glob,Bash --model claude-opus-4-8"

      - name: Verification-first review (retry)
        id: review_retry
        if: steps.review.outcome == 'failure'
        continue-on-error: true
        uses: anthropics/claude-code-action@30544b674398ee15c84819bd87caf8a87e8c7b55 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run /rigor:deep-review for this pull request if the rigor plugin is available.
            If it is not, apply the verification-first bar inline:

            Ground truth first — run `node scripts/lint-plugins.mjs`, `node scripts/check-no-deps.mjs`,
            and the harnesses under `evals/` so the review starts from facts, then review the diff
            against the surrounding code.

            Assign each concern an evidence tier: CONFIRMED (reproduced — a failing test or trace on
            this code) / PROBABLE (strong static evidence, not executed) / SPECULATIVE (a low-confidence
            lead). Before reporting anything, run a disconfirmation pass: is it reachable, already handled,
            intentional, or already tested? Drop what does not survive.

            Post inline comments at file:line, each with its tier and a concrete fix, grouped Blocking
            (CONFIRMED defect or regression) / Should-fix / Nit. Flag any new inconsistency or a regressed
            lint/eval enforcement. For this repo specifically, treat as Blocking: a bundled plugin copy
            that drifts from its canonical scripts/ source, and any change that makes lint-plugins or an
            eval pass while the behavior it guards is broken.

            End with a verdict (approve / approve-with-nits / request-changes) and a short risk read.
            Do NOT inflate tiers: never block on a SPECULATIVE, never wave through a CONFIRMED defect.
          # Model tier pinned — gate quality must not silently track the action default; bump deliberately.
          claude_args: "--allowed-tools Read,Grep,Glob,Bash --model claude-opus-4-8"

      - name: Verification-first review failed twice
        if: steps.review.outcome == 'failure' && steps.review_retry.outcome == 'failure'
        run: |
          echo "Both review attempts failed — failing the gate closed (not waving the PR through)."
          exit 1

      - name: Gate skipped
        if: steps.key.outputs.present != 'true'
        run: echo "No Claude credential set (CLAUDE_CODE_OAUTH_TOKEN or ANTHROPIC_API_KEY) — deep-review gate skipped (fork PR or unconfigured repo)."
